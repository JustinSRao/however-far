<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>However Far</title>
    <style>
      :root {
        --bg: #0b0c12;
        --panel: #14161f;
        --edge: #2c2f3f;
        --text: #e8e6df;
        --dim: #9a97a8;
        --accent: #ffcd75;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #stage { position: relative; }
      #app canvas { display: block; image-rendering: pixelated; }
      #hud {
        position: absolute;
        top: 10px;
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 13px;
        color: var(--dim);
        text-shadow: 0 1px 2px #000;
      }
      #hud .prompt { color: var(--accent); }
      #panel {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        border: 1px solid var(--edge);
        border-radius: 6px;
        padding: 14px 18px;
        min-height: 88px;
        display: none;
        flex-direction: column;
        gap: 8px;
      }
      #panel.open { display: flex; }
      #panel .speaker {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }
      #panel .line { font-size: 16px; line-height: 1.55; }
      #panel .choices { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
      #panel .choice { font-size: 15px; color: var(--text); }
      #panel .choice .key {
        font-family: ui-monospace, Consolas, monospace;
        color: var(--accent);
        margin-right: 8px;
      }
      #sheet {
        position: absolute;
        top: 32px;
        left: 12px;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 12px;
        color: var(--dim);
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        line-height: 1.5;
      }
      #sheet .pool { color: var(--text); }
      #sheet .pool b { color: var(--accent); font-weight: normal; }
      #sheet .attrs { color: var(--dim); }
      #sheet .standing { color: var(--dim); }
      #quests {
        position: absolute;
        top: 32px;
        right: 12px;
        max-width: 260px;
        text-align: right;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 12px;
        color: var(--dim);
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        line-height: 1.5;
      }
      #quests .qt { color: var(--accent); margin-top: 6px; }
      #quests .qo { color: var(--text); }
      #quests .qo.done { color: var(--dim); text-decoration: line-through; }
      #panel .roll {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      #panel .roll.win { color: #7bb05a; }
      #panel .roll.lose { color: #b13e53; }
      #panel .choice.locked { color: var(--dim); }
      #panel .choice .cost {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        color: var(--accent);
        margin-left: 8px;
      }
      #panel .choice.locked .cost { color: #b13e53; }
      #panel .hint {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        color: var(--dim);
        align-self: flex-end;
      }
      #veil {
        position: absolute;
        inset: 0;
        background: color-mix(in srgb, var(--bg) 94%, transparent);
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
      }
      #veil.open { display: flex; }
      #veil .inner { max-width: 560px; display: flex; flex-direction: column; gap: 16px; }
      #veil h1 { font-size: 22px; font-weight: normal; color: var(--accent); letter-spacing: 0.04em; }
      #veil p { font-size: 15px; line-height: 1.6; color: var(--text); }
      #veil .hint { font-family: ui-monospace, Consolas, monospace; font-size: 12px; color: var(--dim); }
      /* Interstitial lines arrive rather than appear — the wait is a moment in
         the fiction, not a progress bar. */
      #veil p.arriving { animation: arrive 1200ms ease-out; }
      @keyframes arrive { from { opacity: 0; } 40% { opacity: 0.85; } to { opacity: 1; } }
      #panel .line.streaming::after {
        content: "▍";
        color: var(--accent);
        animation: blink 900ms steps(2, start) infinite;
        margin-left: 2px;
      }
      @keyframes blink { to { visibility: hidden; } }
      #veil .options { display: flex; flex-direction: column; gap: 8px; text-align: left; margin: 0 auto; }
      #veil .option { font-size: 15px; color: var(--text); }
      #veil .option .key {
        font-family: ui-monospace, Consolas, monospace;
        color: var(--accent);
        margin-right: 10px;
      }
      /* The Call — the only form in the game, so it dresses like the game. */
      #veil .inner.call { max-width: 620px; }
      .call-form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
      .call-form .field { display: flex; flex-direction: column; gap: 4px; }
      .call-form .field span {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--dim);
      }
      .call-form .field small {
        font-family: ui-monospace, Consolas, monospace;
        font-size: 11px;
        color: var(--dim);
        line-height: 1.5;
      }
      .call-form input {
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        border: 1px solid var(--edge);
        border-radius: 4px;
        padding: 8px 10px;
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 15px;
        outline: none;
      }
      .call-form input:focus { border-color: var(--accent); }
      .call-form .key-field { margin-top: 4px; padding-top: 12px; border-top: 1px solid var(--edge); }
      .call-actions { display: flex; gap: 12px; margin-top: 6px; }
      .call-actions button {
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        border-radius: 4px;
        padding: 8px 18px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 15px;
        cursor: pointer;
      }
      .call-actions button.quiet { border-color: var(--edge); color: var(--dim); }
      .call-actions button:hover { border-color: var(--text); color: var(--text); }
      #say {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 12px 16px;
        display: none;
        align-items: center;
        gap: 10px;
      }
      #say.open { display: flex; }
      #say .mark { font-family: ui-monospace, Consolas, monospace; color: var(--accent); }
      #say input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 16px;
      }
      #say input::placeholder { color: var(--dim); font-style: italic; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="app"></div>
      <div id="hud">
        <span id="hud-area"></span>
        <span id="hud-prompt" class="prompt"></span>
      </div>
      <div id="sheet"></div>
      <div id="quests"></div>
      <div id="panel"></div>
      <div id="say">
        <span class="mark">»</span>
        <input id="say-input" type="text" maxlength="500" autocomplete="off" spellcheck="false"
               placeholder="say or do something in your own words…" />
      </div>
      <div id="veil"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
